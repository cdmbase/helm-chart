{{- if and (ne (.Values.external.enabled | toString) "false") .Values.external.service.mongodb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.external.service.mongodb.nameOverride | default (printf "%s-mongodb" .Release.Name) }}
  namespace: "{{ .Release.Namespace }}"
  labels:
{{ include "labels.standard" . | indent 4 }}
    component: mongodb
spec:
  type: ExternalName
  externalName: {{ .Values.external.service.mongodb.serviceName | quote }}
  ports:
  - port: {{ .Values.external.service.mongodb.port }}
{{- end -}}
