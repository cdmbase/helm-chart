{{- if and (ne (.Values.external.enabled | toString) "false") .Values.external.service.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.external.service.redis.nameOverride | default (printf "%s-redis" .Release.Name) }}
  namespace: "{{ .Release.Namespace }}"
  labels:
{{ include "labels.standard" . | indent 4 }}
    component: redis
spec:
  type: ExternalName
  externalName: {{ .Values.external.service.redis.serviceName | quote }}
  ports:
  - port: {{ .Values.external.service.redis.port }}
{{- end -}}