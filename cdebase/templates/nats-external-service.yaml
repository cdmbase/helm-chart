{{- if and (ne (.Values.external.enabled | toString) "false") .Values.external.service.nats.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.external.service.nats.nameOverride | default (printf "%s-nats" .Release.Name) }}
  namespace: "{{ .Release.Namespace }}"
  labels:
{{ include "labels.standard" . | indent 4 }}
    component: nats
spec:
  type: ExternalName
  externalName: {{ .Values.external.service.nats.serviceName | quote }}
  ports:
  - port: {{ .Values.external.service.nats.port }}
{{- end -}}